server:
  port: ${SERVER_PORT:8002}
spring:
  application:
    name: trackflow-server
  datasource:
    url: ${DB_URL:jdbc:h2:file:./out/trackflow-dev-v2;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:trackflow}
    password: ${RABBITMQ_PASSWORD:trackflow_dev_only}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        default-requeue-rejected: false
management:
  endpoints:
    web:
      exposure:
        include: health,info
trackflow:
  mockCarrierBaseUrl: ${MOCK_CARRIER_BASE_URL:http://127.0.0.1:8003}
  webhookClockSkewSeconds: ${WEBHOOK_CLOCK_SKEW_SECONDS:300}
  outboxPublishInterval: ${OUTBOX_PUBLISH_INTERVAL:2000}
  eventMaxRetryCount: ${EVENT_MAX_RETRY_COUNT:5}
